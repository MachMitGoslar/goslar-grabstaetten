services:
  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - tour
      - api
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: ""
        VITE_GEOTOUR_URL: /tour/
    restart: unless-stopped

  tour:
    build:
      context: ${CEMETERY_TOUR_CONTEXT:-./submodules/cemetery-tour}
      dockerfile: ${CEMETERY_TOUR_DOCKERFILE:-Dockerfile}
      args:
        BUILD_COMMAND: ${CEMETERY_TOUR_BUILD_COMMAND:-npm run build -- --base-href /tour/ --deploy-url /tour/}
        DIST_DIR: ${CEMETERY_TOUR_DIST_DIR:-www}
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-grave}:${POSTGRES_PASSWORD:-grave}@db:5432/${POSTGRES_DB:-gravedb}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    build:
      context: ${GRAVE_DB_CONTEXT:-./submodules/grave-db}
      dockerfile: ${GRAVE_DB_DOCKERFILE:-Dockerfile}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gravedb}
      POSTGRES_USER: ${POSTGRES_USER:-grave}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grave}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  db-import:
    build:
      context: ${GRAVE_DB_CONTEXT:-./submodules/grave-db}
      dockerfile: ${GRAVE_DB_IMPORTER_DOCKERFILE:-Dockerfile.importer}
    profiles:
      - import
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-grave}:${POSTGRES_PASSWORD:-grave}@db:5432/${POSTGRES_DB:-gravedb}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
